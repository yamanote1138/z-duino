[platformio]
src_dir = firmware/z-duino
data_dir = build/data
extra_configs = secrets.ini
default_envs = d1_mini

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.filesystem = littlefs
board_build.ldscript = eagle.flash.4m2m.ld
lib_deps =
    bblanchon/ArduinoJson
    links2004/WebSockets
monitor_speed = 115200
upload_speed = 460800

; Host-side unit tests for the hardware-independent logic in lib/
; (MotorLogic, LedTiming, Command). No device needed — run with
; `pio test -e native`. Not part of the default build (see default_envs
; above), so plain `pio run`/build.sh are unaffected.
[env:native]
platform = native
test_framework = unity
lib_deps = bblanchon/ArduinoJson
